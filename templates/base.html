<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}android-tab-harvest{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    // FOUC回避: 描画前に保存値を反映
    (function () {
      const t = localStorage.getItem('theme');
      if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
      const v = localStorage.getItem('view');
      if (v === 'card' || v === 'list') document.documentElement.dataset.view = v;
    })();
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
</head>
<body>
  <header class="topbar">
    <h1><a href="/">🔍 android-tab-harvest</a></h1>
    <nav>
      <button type="button" class="btn-icon" id="view-toggle" title="表示切替">⊞</button>
      <button type="button" class="btn-icon" id="theme-toggle" title="テーマ切替">🌗</button>
      <form method="post" action="/collect" class="inline">
        <button type="submit" class="btn-primary">📱 収集</button>
      </form>
      <a href="/devices" class="btn-link">⚙️ 端末</a>
    </nav>
  </header>
  <script>
    // テーマ切替（保存値があれば優先、なければ prefers-color-scheme に従う）
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const cur = document.documentElement.dataset.theme
        || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
    });
    // 表示モード切替
    document.getElementById('view-toggle').addEventListener('click', () => {
      const cur = document.documentElement.dataset.view || 'list';
      const next = cur === 'card' ? 'list' : 'card';
      document.documentElement.dataset.view = next;
      localStorage.setItem('view', next);
    });
  </script>

  {% if msg %}
  <div class="flash">{{ msg }}</div>
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
